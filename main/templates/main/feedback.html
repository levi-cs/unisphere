{% extends 'main/base.html' %}

{% block body %}

<style>
.feedback-wrapper {
    max-width: 650px;
    margin: 50px auto;
}

.feedback-card {
    background: linear-gradient(145deg, #0b1220, #0f172a);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.feedback-title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 25px;
    color: #c7d2fe;
}

.input-group {
    margin-bottom: 20px;
}

.input-label {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
    display: block;
}

.input-field {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    color: #e2e8f0;
    outline: none;
    transition: 0.3s;
}

.input-field:focus {
    border-color: #6366f1;
    box-shadow: 0 0 8px rgba(99,102,241,0.5);
}

.textarea-field {
    height: 130px;
    resize: none;
}

.submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #7c3aed, #3b82f6); /* 🔥 purple → blue */
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 12px rgba(124, 58, 237, 0.6);
}
</style>

<div class="feedback-wrapper">
    <div class="feedback-card">

        <div class="feedback-title">Grievance & Feedback</div>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label class="input-label">Topic</label>
                <input type="text" name="subject" class="input-field" required>
            </div>

            <div class="input-group">
                <label class="input-label">Description</label>
                <textarea name="message" class="input-field textarea-field" required></textarea>
            </div>

            <button type="submit" class="submit-btn">
                Submit Feedback
            </button>

        </form>

    </div>
</div>

{% endblock %}
